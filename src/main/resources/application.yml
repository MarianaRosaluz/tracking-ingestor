spring:
  application:
    name: microtrack-central

  datasource:
    url: jdbc:postgresql://localhost:5432/microtrack
    username: microtrack_user
    password: microtrack_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.PostgreSQLDialect  # <--- adicionado
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false

  kafka:
    streams:
      bootstrap-servers: localhost:9092
      application-id: microtrack-central
      default:
        key-serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        value-serde: org.apache.kafka.common.serialization.Serdes$StringSerde
