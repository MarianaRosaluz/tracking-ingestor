version: '3.8'

services:
  # PostgreSQL / TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: microtrack-db
    environment:
      POSTGRES_USER: microtrack_user
      POSTGRES_PASSWORD: microtrack_pass
      POSTGRES_DB: microtrack
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # Zookeeper necessário para Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: microtrack-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: microtrack-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  # Redpanda Console - UI para visualizar mensagens do Kafka
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: microtrack-redpanda-console
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:29092
    ports:
      - "8081:8080"

volumes:
  db_data:
